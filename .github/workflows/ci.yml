name: CI

# Treat the agent as code: lint it, run the deterministic test suite behind a
# coverage gate, replay the deterministic (no-spend) skill-eval tier, and scan
# the staged tree for personal/financial files. No frontend, no Docker, no live
# eval — the agent runs via the stdio MCP server in a Claude Code session.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (incl. dev group)
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests with coverage gate
        run: uv run pytest --cov=local_budget --cov-report=term-missing --cov-fail-under=80

      - name: Deterministic skill eval (mock tier — no spend)
        run: uv run python scripts/eval.py --mock

      - name: Secret scan (staged-tree denylist)
        run: bash scripts/secret-scan.sh
