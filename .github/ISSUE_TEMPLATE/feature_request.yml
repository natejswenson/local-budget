name: Feature request
description: Propose a new tool, skill, or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's painful about how it works now?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? A new MCP tool, a CLI command, a skill change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, including "I work around it today by ...".
  - type: checkboxes
    id: fit
    attributes:
      label: Design fit
      description: This project is local-first and the server runs no inference — reasoning happens in the Claude session.
      options:
        - label: This request keeps data local and keeps the server deterministic (no inference in the server).
